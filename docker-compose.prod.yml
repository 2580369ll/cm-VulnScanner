version: '3.9'

services:
  # Redis (消息队列 + 缓存)
  redis:
    image: redis:7-alpine
    container_name: vs-redis
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'

  # Celery Worker (扫描引擎)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vs-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/scanner.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SCAN_DELAY: '0.5'
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 256m

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vs-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/scanner.db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      SCAN_DELAY: '0.5'
    depends_on:
      - redis
    restart: unless-stopped
    mem_limit: 256m

  # PHP 靶场
  targets:
    image: php:8.2-cli-alpine
    container_name: vs-targets
    command: php -S 0.0.0.0:8080 /var/www/html/router.php
    volumes:
      - ./targets:/var/www/html
    restart: unless-stopped
    mem_limit: 64m

  # Nginx (前端静态文件 + API代理)
  nginx:
    image: nginx:alpine
    container_name: vs-nginx
    user: root
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - '8082:80'
    depends_on:
      - backend
      - targets
    restart: unless-stopped
    mem_limit: 32m

