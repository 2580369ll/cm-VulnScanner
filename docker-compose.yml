version: "3.9"

services:
  # ============ PostgreSQL ============
  postgres:
    image: postgres:16-alpine
    container_name: vs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-scanner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-scanner_pass_2024}
      POSTGRES_DB: ${DB_NAME:-vuln_scanner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # 数据库端口不暴露到宿主机，仅容器间通信
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d vuln_scanner"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ Redis ============
  redis:
    image: redis:7-alpine
    container_name: vs-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    # Redis 端口不暴露到宿主机
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============ FastAPI Backend ============
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vs-backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://scanner:scanner_pass_2024@postgres:5432/vuln_scanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============ Celery Worker ============
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vs-worker
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://scanner:scanner_pass_2024@postgres:5432/vuln_scanner
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============ Vue 3 Frontend ============
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vs-frontend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # ============ Nginx ============
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vs-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./targets:/var/www/targets
    depends_on:
      - backend
      - frontend

  # ============ 漏洞靶场 ============
  targets:
    image: php:8.2-apache
    container_name: vs-targets
    restart: unless-stopped
    volumes:
      - ./targets:/var/www/html
    ports:
      - "8080:80"

volumes:
  pgdata:
  redisdata:
